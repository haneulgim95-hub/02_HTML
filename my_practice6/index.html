<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <header class="header">
        <div class="header-title">
            <h2>Device Management</h2>
            <span>Total 4 Devices</span>
        </div>
        <button class="btn-add">+Add Devices</button>
    </header>

    <main>
        <table class="data-table">
            <thead>
            <tr>
                <th>Device Name</th>
                <th>Location</th>
                <th>Status</th>
                <th>Battery</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>
                    <div class="device-info">
                        <div class="icon-box icon-yellow"></div>
                        <span class="device-name">Smart Bulb A</span>
                    </div>
                </td>
                <td>Living Room</td>
                <td>
                    <div class="status-badge badge-online">
                        <div class="status-dot"></div>
                        <span>Online</span>
                    </div>
                </td>
                <td>
                    <div class="battery-wrapper">
                        <div class="battery-bar">
                            <div class="battery-fill"></div>
                        </div>
                        <span class="battery-text">85%</span>
                    </div>
                </td>
                <td>
                    <div>
                        <button class="btn-edit">Edit</button>
                    </div>
                </td>
            </tr>
            <tr>
                <td>
                    <div class="device-info">
                        <div class="icon-box icon-orange"></div>
                        <span class="device-name">Main Thermostat</span>
                    </div>
                </td>
                <td>Hallway</td>
                <td>
                    <div class="status-badge badge-offline">
                        <div class="status-dot"></div>
                        <span>Offline</span>
                    </div>
                </td>
                <td>
                    <div class="battery-wrapper">
                        <div class="battery-bar">
                            <div class="battery-fill fill-low"></div>
                        </div>
                        <span class="battery-text">15%</span>
                    </div>
                </td>
                <td>
                    <div>
                        <button class="btn-edit">Edit</button>
                    </div>
                </td>
            </tr>
            <tr>
                <td>
                    <div class="device-info">
                        <div class="icon-box icon-gray"></div>
                        <span class="device-name">Coffee Marker plug</span>
                    </div>
                </td>
                <td>Hallway</td>
                <td>
                    <div class="status-badge badge-online">
                        <div class="status-dot"></div>
                        <span>Online</span>
                    </div>
                </td>
                <td>
                    <div class="plugged-in">
                        Plugged In
                    </div>
                </td>
                <td>
                    <div>
                        <button class="btn-edit">Edit</button>
                    </div>
                </td>
            </tr>
            <tr>
                <td>
                    <div class="device-info">
                        <div class="icon-box icon-yellow"></div>
                        <span class="device-name">Smart Bulb A</span>
                    </div>
                </td>
                <td>Living Room</td>
                <td>
                    <div class="status-badge badge-online">
                        <div class="status-dot"></div>
                        <span>Online</span>
                    </div>
                </td>
                <td>
                    <div class="battery-wrapper">
                        <div class="battery-bar">
                            <div class="battery-fill"></div>
                        </div>
                        <span class="battery-text">85%</span>
                    </div>
                </td>
                <td>
                    <div>
                        <button class="btn-edit">Edit</button>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </main>
</div>
</body>
</html>
