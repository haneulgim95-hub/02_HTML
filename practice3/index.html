<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
          rel="stylesheet">
</head>
<body>
<div class="container">
    <section class="storage-area">
        <div class="hdd-card card">
            <div class="hdd-icon">
                <div class="hdd-inner">

                </div>
            </div>

            <div class="hdd-footer">
                <span class="hdd-size">4TB</span>
                <div class="hdd-dots">
                    <div></div>
                    <div></div>
                    <div></div>
                    <div></div>
                </div>
            </div>
        </div>
        <div class="hdd-card card">
            <div class="hdd-icon">
                <div class="hdd-inner">

                </div>
            </div>

            <div class="hdd-footer">
                <span class="hdd-size">4TB</span>
                <div class="hdd-dots">
                    <div></div>
                    <div></div>
                    <div></div>
                    <div></div>
                </div>
            </div>
        </div>
        <div class="hdd-card card">
            <div class="hdd-icon">
                <div class="hdd-inner">

                </div>
            </div>

            <div class="hdd-footer">
                <span class="hdd-size">4TB</span>
                <div class="hdd-dots">
                    <div></div>
                    <div></div>
                    <div></div>
                    <div></div>
                </div>
            </div>
        </div>
        <div class="hdd-card card">
            <div class="hdd-icon">
                <div class="hdd-inner"></div>
            </div>

            <div class="hdd-footer">
                <span class="hdd-size">4TB</span>
                <div class="hdd-dots">
                    <div></div>
                    <div></div>
                    <div></div>
                    <div></div>
                </div>
            </div>
        </div>

        <div class="card space-card">
            <div class="space-item">
                <h3>Use (TB) / of Total</h3>
                <h2>5.66</h2>
            </div>

            <div class="space-item">
                <h3>Available (TB)</h3>
                <h2 class="accent">2.34</h2>
            </div>
        </div>

        <div class="card setting-card">
            <button>Manage Space</button>
            <button>Disc Setting</button>
            <button>Create Backup</button>
        </div>
    </section>
    <section class="stats-area">
        <div class="stats-row bg-slate">
            <span class="stats-name">System Files</span>
            <span class="stats-size">0.50TB</span>
        </div>
        <div class="stats-row bg-yellow">
            <span class="stats-name">Media & Photos</span>
            <span class="stats-size">1.82TB</span>
        </div>
        <div class="stats-row bg-red">
            <span class="stats-name">Applications</span>
            <span class="stats-size">1.20TB</span>
        </div>
        <div class="stats-row bg-blue">
            <span class="stats-name">Documents</span>
            <span class="stats-size">2.14TB</span>
        </div>
        <div class="stats-row">
            <span class="stats-name">Free space</span>
            <span class="stats-size">2.34TB</span>
        </div>
    </section>
</div>
</body>
</html>
