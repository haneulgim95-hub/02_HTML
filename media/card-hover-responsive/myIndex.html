<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f5f4f4;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 200px;
            height: 200px;
            border-radius: 15px;
            background-color: blue;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .card:hover {
                transform: none;
            }
        }

    </style>
</head>
<body>
<div class="card"></div>
</body>
</html>
