<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
<div class="container">
    <aside class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-cube brand-icon"></i>
            <h2>MyDash</h2>
        </div>
        <nav class="nav-menu">
            <a href="#" class="nav-item active">
                <i class="fa-regular fa-id-badge"></i>
                <span>Profile info</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-shield-halved"></i>
                <span>Account Security</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-regular fa-bell"></i>
                <span>Notifications</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-regular fa-credit-card"></i>
                <span>Billing Details</span>
            </a>
        </nav>
    </aside>
    <main class="main-content">
        <header class="top-header">
            <div class="header-text">
                <h2>Profile Information</h2>
                <p>Update your photo and personal details</p>
            </div>
            <div class="user-shortcut">
                <i class="fa-solid fa-magnifying-glass"></i>
                <div class="user-avatar-small">A</div>
            </div>
        </header>
        <div class="content-wrapper">
            <div class="content">
                <div class="content-top">
                    <div class="user-avatar-big">A</div>
                    <button class="btn blue-btn">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        Upload
                    </button>
                    <button class="btn white-btn">
                        <i class="fa-solid fa-trash-can"></i>
                        Remove
                    </button>
                </div>
                <form>
                    <div class="form-group half">
                        <label for="first-name">First Name</label>
                        <input type="text" placeholder="Alex" name="first-name" id="first-name">
                    </div>
                    <div class="form-group half">
                        <label for="last-name">Last Name</label>
                        <input type="text" placeholder="Smith" name="last-name" id="last-name">
                    </div>
                    <div class="form-group full">
                        <label for="email">Email Address</label>
                        <input type="email" placeholder="alex.smith@example.com" name="email" id="email">
                    </div>
                    <div class="form-group full">
                        <label for="phone-number">Phone Number</label>
                        <input type="tel" placeholder="+1 234 567 890" name="phone-number" id="phone-number">
                    </div>
                    <div class="checkbox-wrapper">
                        <input id="newsletter" type="checkbox">
                        <label for="newsletter">Receive updates and newsletters via email</label>
                    </div>
                    <div class="btn-wrapper">
                        <button type="button" class="btn white-btn">Cancel</button>
                        <button type="button" class="btn blue-btn">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
