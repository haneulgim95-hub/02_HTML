<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="list-container">
    <div class="list-header">
        <div class="header-title">
            <h2>Device Management</h2>
            <span class="device-count">Total 4 Devices</span>
        </div>
        <button class="btn-add">+Add Device</button>
    </div>
    <div class="table-wrapper">
        <table class="data-table">
            <thead>
            <tr>
                <th>Device Name</th>
                <th>Location</th>
                <th>Status</th>
                <th>Battery</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>
                    <div class="device-info">
                        <div class="icon-box bg-yellow"></div>
                        <span class="device-name">Smart Bulb A</span>
                    </div>
                </td>
                <td class="">Living Room</td>
                <td>
                    <div class="status-badge status-online">
                        <div class="status-dot"></div>
                        <span>Online</span>
                    </div>
                </td>
                <td>
                    <div class="battery-wrapper">
                        <div class="battery-bar">
                            <div class="battery-fill"></div>
                        </div>
                        <span class="battery-text">85%</span>
                    </div>
                </td>
                <td>
                    <div class="action-btns">
                        <button class="btn-edit">Edit</button>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
