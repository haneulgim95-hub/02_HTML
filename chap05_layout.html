<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <div style="background-color: #aaa; padding: 50px; margin-bottom: 30px">이것은 div 입니다</div>
    <div style="background-color: green; padding: 100px 50px 10px 30px">이것은 div 입니다</div>
    <div style="background-color: orange; padding: 100px 50px; margin-bottom: 30px">이것은 div 입니다</div>

    <div style="margin-bottom: 50px; background-color: aqua">
        <h3 style="color:#d9534f">1. content-box (기본값)</h3>
        <div style="width: 200px; height: 100px; padding: 20px; border: 10px solid #333; background-color: #ffcccc;">전체 너비 : 260px</div>
    </div>

    <div style="margin-bottom: 50px; background-color: aqua">
        <h3 style="color:#d9534f">2. border-box (기본값)</h3>
        <div style="box-sizing: border-box ;width: 200px; height: 100px; padding: 20px; border: 10px solid #333; background-color: #ffcccc;">전체 너비 : 200px</div>
    </div>

</body>
</html>
