<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

</head>
<body>
<!--
    flexbox : 정렬을 할 부모 요소 안에 자식 요소를 배치하는 방식
-->
<div style="display: flex;">
  <div style="width: 100px; height: 100px; background-color: red;"></div>
  <div style="width: 100px; height: 100px; background-color: blue;"></div>
  <div style="width: 100px; height: 100px; background-color: orange;"></div>
</div>

<!--
  결국, 큰 영역을 그리고 그 안에 요소를 배치하는 방식임
-->
<!--
  max-width: 1200px = 화면이 1200px보다 작을때는 100%를 차지하고, 1200px를 초과하지 않는다.
-->
<!--
    justify-content 속성 : 메인 축에 대한 정렬을 뜻함
                        : 기본은 가로 축이 메인임
                        flex-start : 시작점부터 정렬(기본값)
                        flex-end : 끝점부터 정렬
                        center : 중앙에 정렬
                        space-between : 양 끝에 정렬시킨 뒤 나머지를 여백 크기가 동일하게 정렬
                        space-around : 중앙을 중심으로 양 옆 정렬.
-->
<div style="width: 100%; display: flex; margin-bottom: 50px; border-bottom: 1px solid #ccc; background-color: #aaaaaa">
  <header style="width: 100%; max-width: 1200px; height: 80px; display: flex; background-color: aqua; margin: 0 auto">
    <div style="background-color: red">로고자리</div>
    <div style="background-color: blue">메뉴자리</div>
    <div style="background-color: yellow">로그인자리</div>
  </header>
</div>

<!--
    align-items 속성 : 보조 축에 대한 정렬
                    : 기본은 세로 축이 보조임
                    flex-start : 시작점부터 정렬
                    flex-end : 끝점부터 정렬
                    center : 중앙에 정렬
-->

<div style="width: 100%; display: flex;margin-bottom: 50px; border-bottom: 1px solid #ccc; background-color: #aaaaaa">
  <header style="width: 100%; max-width: 1200px; height: 80px; display: flex; background-color: aqua; margin: 0 auto">
    <div style="background-color: red; display: flex; align-items: center;font-size: 20px">로고자리</div>
    <div style="background-color: blue;display: flex; align-items: center;font-size: 35px">메뉴자리</div>
    <div style="background-color: yellow;display: flex; align-items: center; font-size: 20px">로그인자리</div>
  </header>
</div>


<!--
  flex-grow : 나머지 공간의 자리를 다 차지한다.
  밑의 예제에서는 메뉴자리라는 div가 가변의 길이를 같는다
  뒤의 숫자 1은 나머지 공간의 얼마를 가져가느냐를 나타내는 비율을 의미한다
-->
<div style="width: 100%; display: flex;margin-bottom: 50px; border-bottom: 1px solid #ccc; background-color: #aaaaaa">
  <header style="width: 100%; max-width: 1200px; height: 80px; display: flex; background-color: aqua; margin: 0 auto">
    <div style="width:150px; background-color: red; display: flex; align-items: center;font-size: 20px">로고자리</div>
    <div style="flex-grow:1; background-color: blue;display: flex; align-items: center;font-size: 35px">메뉴자리</div>
    <div style="flex-grow:3; background-color: blue;display: flex; align-items: center;font-size: 35px">메뉴자리</div>
    <div style="width:200px;background-color: yellow;display: flex; align-items: center; font-size: 20px">로그인자리</div>
  </header>
</div>
<!--flex가 가로 정렬되었을때 자식 요소는 부모의 높이만큼 늘어난다-->

<div style="width: 100%; display: flex;margin-bottom: 50px; border-bottom: 1px solid #ccc; background-color: #aaaaaa">
  <header style="width: 100%; max-width: 1200px; height: 80px; display: flex; background-color: aqua; margin: 0 auto">
    <div style="width:800px; background-color: red; display: flex; align-items: center;font-size: 20px">로고자리</div>
    <div style="width: 800px; background-color: blue;display: flex; align-items: center;font-size: 35px">메뉴자리</div>
    <div style="width:200px;background-color: yellow;display: flex; align-items: center; font-size: 20px">로그인자리</div>
  </header>
</div>
<!--flex가 가로 정렬되었을때 자식 요소 가로길이가 부모의 가로길이 보다 커져도, 부모의 가로길이 안에 우겨넣는다.
그대신 비율로서 자리를 차지하게 된다.-->

<div style="width: 100%; display: flex; gap:10px; flex-wrap: wrap; justify-content: center;">
  <div style="width:  300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
  <div style="width:  300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
  <div style="width:  300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
  <div style="width:  300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
  <div style="width:  300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
  <div style="width:  300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
  <div style="width:  300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
  <div style="width:  300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
  <div style="width:  300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
  <div style="width:  300px; height: 100px; border-radius: 20px; background-color: #aaa;">Card</div>
</div>
<!--부모에 flex를 적용했을때 자식들의 가로길이가 부모의 길이보다 커져도 그 안에 우겨넣어 지기 때문에
자식의 가로길이는 무시된다.
부모의 높이값을 주어도 자식에 높이값을 주면 부모의 높이값이 무시된다. -->
<!--flex-wrap: wrap을 쓰면 자식들의 가로 길이를 그대로 출력 해주고, 줄바꿈을 허용한다.-->


<div style="width: 100%; display: flex; flex-direction: column;background-color: #ffcccc">
  <div style="width:  300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
  <div style="width:  300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
  <div style="width:  300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
  <div style="width:  300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
  <div style="width:  300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
  <div style="width:  300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
  <div style="width:  300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
  <div style="width:  300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
  <div style="width:  300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
  <div style="width:  300px; height: 100px; border-radius: 20px; background-color: #aaa;">Card</div>
</div>

<!--flex-direction : column일때는 justify-content가 세로를 결정
그리고 컬럼일때는 자식의 가로길이가 부모의 가로길이 만큼 늘어난다.
그리고 row방향일때는 자식의 높이가 부모의 높이만큼 늘어난다.
-->
<div style="width: 100%; display: flex; flex-direction: column;">
  <div style=" border-radius: 20px; background-color: #aaa;">Card</div>
  <div style=" border-radius: 20px; background-color: #aaa;">Card</div>
  <div style=" border-radius: 20px; background-color: #aaa;">Card</div>
  <div style=" border-radius: 20px; background-color: #aaa;">Card</div>
</div>

<!--flex-direction : column일때, 부모의 넓이를 줬기때문에 자식의 가로길이를 주지 않아도 부모의 가로길이만큼 늘어난다.-->


</body>
</html>
